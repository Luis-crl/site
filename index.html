<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Solicitar Coleta Seletiva</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>

  <header>
    <h1>🌱 Coleta Seletiva</h1>
  </header>

  <main class="container">
    <h2>Solicitar Coleta</h2>

    <form id="formColeta">
      <label>Nome:</label>
      <input type="text" id="nome" required>

      <label>Tipo de Material:</label>
      <select id="material">
        <option>Plástico</option>
        <option>Papel</option>
        <option>Vidro</option>
        <option>Metal</option>
      </select>

      <label>Localização:</label>
      <input type="text" id="localizacao" placeholder="Ex: Rua X, nº 123">

      <button type="submit">Solicitar Coleta</button>
    </form>

    <p id="msg"></p>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyALKIKPp6mACEDtBlPRwUJT5M4eI0cur3Y",
      authDomain: "coleta-celetiva.firebaseapp.com",
      databaseURL: "https://coleta-celetiva-default-rtdb.firebaseio.com/",
      projectId: "coleta-celetiva",
      storageBucket: "coleta-celetiva.firebasestorage.app",
      messagingSenderId: "731957827084",
      appId: "1:731957827084:web:bb16f1ca26529619a98029"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 🔥 CORREÇÃO AQUI
    const form = document.getElementById("formColeta");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const dados = {
        nome: document.getElementById("nome").value,
        material: document.getElementById("material").value,
        localizacao: document.getElementById("localizacao").value,
        status: "Pendente"
      };

      push(ref(db, "coletas"), dados);

      msg.innerText = "✅ Solicitação enviada!";
      form.reset();
    });
  </script>

</body>
</html>
